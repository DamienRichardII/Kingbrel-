<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FFC500" />
  <meta name="robots" content="noindex" />
  <title>KINGBREL — Maintenance en cours</title>
  <link rel="icon" href="./assets/favicon.jpeg" type="image/jpeg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b0b0c;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      text-align: center;
    }

    /* Logo animé */
    .logo {
      height: 48px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp .6s cubic-bezier(.2,.8,.2,1) .1s forwards;
    }

    /* Barre de chargement */
    .bar-wrap {
      width: 220px;
      height: 3px;
      background: rgba(255,255,255,.10);
      border-radius: 99px;
      overflow: hidden;
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp .6s cubic-bezier(.2,.8,.2,1) .2s forwards;
    }
    .bar-fill {
      height: 100%;
      width: 40%;
      background: #FFC500;
      border-radius: 99px;
      animation: slide 1.8s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); width: 40%; }
      50%  { width: 60%; }
      100% { transform: translateX(350%); width: 40%; }
    }

    /* Titre */
    .title {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.15;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp .6s cubic-bezier(.2,.8,.2,1) .3s forwards;
    }
    .title span { color: #FFC500; }

    /* Sous-titre */
    .lead {
      font-size: 16px;
      color: rgba(255,255,255,.60);
      line-height: 1.65;
      max-width: 400px;
      margin: 0 auto 40px;
      opacity: 0;
      animation: fadeUp .6s cubic-bezier(.2,.8,.2,1) .4s forwards;
    }

    /* Réseaux sociaux */
    .socials {
      display: flex;
      gap: 14px;
      justify-content: center;
      opacity: 0;
      animation: fadeUp .6s cubic-bezier(.2,.8,.2,1) .5s forwards;
    }
    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 99px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.80);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background .2s, border-color .2s, color .2s;
    }
    .social-btn:hover {
      background: #FFC500;
      border-color: #FFC500;
      color: #000;
    }
    .social-btn img {
      height: 16px;
      width: 16px;
      filter: invert(1);
      transition: filter .2s;
    }
    .social-btn:hover img { filter: invert(0); }

    /* Footer */
    .footer-note {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,.25);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <img src="./assets/kingbrel-logo.png" alt="KINGBREL" class="logo" />

  <div class="bar-wrap">
    <div class="bar-fill"></div>
  </div>

  <h1 class="title">On arrive<span>.</span></h1>

  <p class="lead">
    Le site est en cours de mise à jour.<br />
    On revient très vite avec du nouveau.
  </p>

  <div class="socials">
    <a class="social-btn" href="https://www.instagram.com/kingbrel__/" target="_blank" rel="noopener">
      <img src="./assets/icon-instagram.svg" alt="" />
      Instagram
    </a>
    <a class="social-btn" href="https://www.tiktok.com/@kingbrel__" target="_blank" rel="noopener">
      <img src="./assets/icon-tiktok.svg" alt="" />
      TikTok
    </a>
  </div>

  <p class="footer-note">© 2026 KINGBREL — Maintenance temporaire</p>

</body>
</html>
